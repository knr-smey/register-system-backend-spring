version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: register_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: register_db
    ports:
      - "3308:3306"  # Host:Container
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile.dev
    container_name: register_app
    restart: unless-stopped
    ports:
      - "8003:8000"  # Host:Container
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/register_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: register_db
      DB_USER: root
      DB_PASS: root

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: register_phpmyadmin
    restart: unless-stopped
    platform: linux/amd64           # Fixes exec format error on Windows x86_64
    ports:
      - "8081:80"                   # Host:Container
    environment:
      PMA_HOST: mysql                # Must match MySQL service name
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: